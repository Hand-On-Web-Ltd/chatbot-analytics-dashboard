<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Analytics Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>📊 Chatbot Analytics</h1>
            <p class="subtitle">Last 28 days</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Conversations</div>
                <div class="stat-value" id="totalConversations">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Response Time</div>
                <div class="stat-value" id="avgResponseTime">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Satisfaction Score</div>
                <div class="stat-value" id="satisfactionScore">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Conversion Rate</div>
                <div class="stat-value" id="conversionRate">—</div>
            </div>
        </div>

        <div class="chart-container">
            <h2>Messages Per Day</h2>
            <canvas id="messagesChart"></canvas>
        </div>

        <div class="table-container">
            <h2>Top Questions</h2>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Question</th>
                        <th>Times Asked</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="questionsTable"></tbody>
            </table>
        </div>

        <footer>
            <p>Built by <a href="https://www.handonweb.com" target="_blank">Hand On Web</a></p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
